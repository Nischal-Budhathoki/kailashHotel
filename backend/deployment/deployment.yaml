apiVersion: apps/v1
kind: Deployment

metadata:
  name: hotel-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hotel-backend

  template:
    metadata:
      labels:
        app: hotel-backend

    spec:
      containers:
        - name: backend
          image: nischal/hotel-backend:v1

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"